            padding: 0;
            box-sizing: border-box;
        }
        body {

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            8% {
                opacity: 0.35;
            }
            92% {
                opacity: 0.06;
            }
            100% {
                transform: translateY(-10vh) scale(1.3);
                opacity: 0;
            }
        }
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

            font-size: 2.4rem;
            letter-spacing: 3px;
            animation: subtleBounce 2.2s ease-in-out infinite;
        }

            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-7px);
            }
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text);
            font-family: 'Georgia', serif;
        }
        .header .subtitle {

            color: var(--text-secondary);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 300;
        }
        .header .db-badge {
            display: inline-block;
            margin-top: 2px;
            font-size: 0.7rem;
            color: var(--accent-2);
            background: rgba(249, 199, 79, 0.08);
            padding: 4px 12px;
            border-radius: 50px;
            letter-spacing: 1px;
            font-family: 'Segoe UI', sans-serif;
        }
        .topics-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 0 2px;
        }
        .topic-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            letter-spacing: 0.4px;
            transition: var(--transition);
            user-select: none;
            white-space: nowrap;
            font-weight: 400;
        }
        .topic-pill:hover {
            border-color: var(--accent-3);
            color: var(--text);
            background: var(--surface-2);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(76, 201, 240, 0.12);
        }
        .topic-pill.active {
            background: var(--accent-3);
            border-color: var(--accent-3);
            color: #0b0a10;
            font-weight: 600;
            box-shadow: 0 4px 18px rgba(76, 201, 240, 0.3);
        }
        .quote-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px 28px;
            box-shadow: var(--shadow);
            position: relative;
            transition: var(--transition);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }
        .quote-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent-4));
            border-radius: 3px 3px 0 0;
            opacity: 0.7;
        }
        .quote-card .quote-mark {
            position: absolute;
            top: 10px;
            left: 16px;
            font-size: 4.5rem;
            color: rgba(255, 255, 255, 0.025);
            font-family: 'Georgia', serif;
            line-height: 1;
            pointer-events: none;
            user-select: none;
        }
        .quote-card .quote-text {
            font-size: 1.4rem;
            line-height: 1.6;
            color: var(--text);
            font-style: italic;
            position: relative;
            z-index: 1;
            transition: var(--transition);
            letter-spacing: 0.2px;
        }
        .quote-card .quote-author {
            margin-top: 14px;
            font-size: 0.95rem;
            color: var(--accent-2);
            font-weight: 600;
            letter-spacing: 0.4px;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            position: relative;
            z-index: 1;
        }
        .quote-card .quote-context {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
            border-left: 2px solid var(--accent-3);
            padding-left: 12px;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            animation: fadeInContext 0.45s ease;
            letter-spacing: 0.15px;
            line-height: 1.45;
        }
        @keyframes fadeInContext {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .quote-card .theme-tag {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-4);
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .quote-card.shimmer {
            animation: shimmerEffect 0.5s ease;
        }
        @keyframes shimmerEffect {
            0% {
                box-shadow: var(--shadow), 0 0 0px rgba(255, 255, 255, 0);
            }
            50% {
                box-shadow: var(--shadow), 0 0 55px rgba(255, 255, 255, 0.07);
            }
            100% {
                box-shadow: var(--shadow), 0 0 0px rgba(255, 255, 255, 0);
            }
        }
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 13px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 500;
            letter-spacing: 0.6px;
            transition: var(--transition);
            border: none;
            outline: none;
            user-select: none;
            position: relative;
            overflow: hidden;

            color: #fff;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.28);

        }
        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--accent-2);
            color: var(--accent-2);
            background: rgba(249, 199, 79, 0.04);

            letter-spacing: 0.8px;
        }
        .counter span {
            color: var(--accent-2);
            font-weight: 600;
        }
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--surface-2);
            color: var(--text);
            padding: 11px 22px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 0.4px;
            border: 1px solid var(--border);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

            }
            .quote-card .quote-author {
                font-size: 0.85rem;
            }
            .btn {
                padding: 11px 18px;
                font-size: 0.8rem;
            }
            .header h1 {
                font-size: 1.35rem;
            }
            .topic-pill {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

            // Deduplicate by text
            const seenTexts = new Set();
            const uniqueDatabase = finalDatabase.filter(q => {
                const key = q.text.toLowerCase().trim();
                if (seenTexts.has(key)) return false;
                seenTexts.add(key);
                return true;
            });

            console.log(`📚 Total unique quotes loaded: ${uniqueDatabase.length}`);

            // ─────────────────────────────────────
            // STATE
            // ─────────────────────────────────────
            let activeTopic = 'all';
            let shownQuoteIndices = new Set();
            let currentQuoteIndex = -1;
            let totalQuotesShown = 0;

            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const quoteCard = document.getElementById('quoteCard');
            const quoteTextEl = document.getElementById('quoteText');
            const quoteAuthorEl = document.getElementById('quoteAuthor');
            const quoteContextEl = document.getElementById('quoteContext');
            const themeTagEl = document.getElementById('themeTag');
            const quoteCountEl = document.getElementById('quoteCount');
            const remainingCountEl = document.getElementById('remainingCount');
            const topicsWrapper = document.getElementById('topicsWrapper');
            const btnNewQuote = document.getElementById('btnNewQuote');
            const btnCopy = document.getElementById('btnCopy');
            const btnSpeak = document.getElementById('btnSpeak');
            const toastEl = document.getElementById('toast');
            const particlesContainer = document.getElementById('particles');

            // ─────────────────────────────────────
            // PARTICLES
            // ─────────────────────────────────────
            function createParticles() {
                const colors = ['#ff6b6b', '#f9c74f', '#4cc9f0', '#9b7ed8', '#f9844a', '#43aa8b'];
                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.animationDuration = Math.random() * 20 + 12 + 's';
                    particle.style.animationDelay = Math.random() * 18 + 's';
                    particlesContainer.appendChild(particle);
                }
            }
            createParticles();

            // ─────────────────────────────────────
            // TOAST
            // ─────────────────────────────────────
            let toastTimer;

            function showToast(message) {
                clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.classList.add('show');
                toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            // ─────────────────────────────────────
            // GET FILTERED QUOTES
            // ─────────────────────────────────────
            function getFilteredQuotes() {
                if (activeTopic === 'all') return uniqueDatabase;
                return uniqueDatabase.filter(q => q.themes.includes(activeTopic));
            }

            // ─────────────────────────────────────
            // GET RANDOM UNSEEN QUOTE
            // ─────────────────────────────────────
            function getRandomUnseenQuote() {
                const filtered = getFilteredQuotes();
                if (filtered.length === 0) return null;
                const filteredIndices = [];
                uniqueDatabase.forEach((q, i) => {
                    if (activeTopic === 'all' || q.themes.includes(activeTopic)) filteredIndices.push(i);
                });
                let unseenIndices = filteredIndices.filter(i => !shownQuoteIndices.has(i));
                if (unseenIndices.length === 0) {
                    filteredIndices.forEach(i => shownQuoteIndices.delete(i));
                    unseenIndices = [...filteredIndices];
                }
                const randomIdx = unseenIndices[Math.floor(Math.random() * unseenIndices.length)];
                shownQuoteIndices.add(randomIdx);
                return { quote: uniqueDatabase[randomIdx], index: randomIdx };
            }

            // ─────────────────────────────────────
            // DISPLAY QUOTE
            // ─────────────────────────────────────
            function displayQuote(result) {
                if (!result) {
                    quoteTextEl.textContent = 'No quotes found for this topic. Try another!';
                    quoteAuthorEl.textContent = '';
                    quoteContextEl.style.display = 'none';
                    themeTagEl.textContent = '';
                    currentQuoteIndex = -1;
                    updateCounts();
                    return;
                }
                const { quote, index } = result;
                currentQuoteIndex = index;
                totalQuotesShown++;
                quoteTextEl.textContent = `"${quote.text}"`;
                quoteAuthorEl.textContent = `— ${quote.author}`;
                themeTagEl.textContent = quote.themes.join(' · ').toUpperCase();
                const hasContext = quote.context !== null && quote.context !== undefined;
                const showStoredContext = hasContext && Math.random() < 0.85;
                if (showStoredContext && quote.context) {
                    quoteContextEl.textContent = '💡 ' + quote.context;
                    quoteContextEl.style.display = 'block';
                } else if (!hasContext && Math.random() < 0.12) {
                    const autoContexts = [
                        'This quote has inspired millions around the world.',
                        'A timeless reminder worth returning to.',
                        'Words that resonate across generations.',
                        'Simple yet profound — the mark of true wisdom.',
                        'Take a moment to let this sink in.',
                        'A powerful perspective shift in just a few words.',
                        'Worth writing down and revisiting often.',
                    ];
                    quoteContextEl.textContent = '💡 ' + autoContexts[Math.floor(Math.random() * autoContexts.length)];
                    quoteContextEl.style.display = 'block';
                } else {
                    quoteContextEl.style.display = 'none';
                }
                quoteCard.classList.remove('shimmer');
                void quoteCard.offsetWidth;
                quoteCard.classList.add('shimmer');
                updateCounts();
            }

            function updateCounts() {
                const filtered = getFilteredQuotes();
                const filteredIndices = [];
                uniqueDatabase.forEach((q, i) => {
                    if (activeTopic === 'all' || q.themes.includes(activeTopic)) filteredIndices.push(i);
                });
                const unseenCount = filteredIndices.filter(i => !shownQuoteIndices.has(i)).length;
                quoteCountEl.textContent = totalQuotesShown;
                remainingCountEl.textContent = Math.max(0, unseenCount);
            }

            // ─────────────────────────────────────
            // ACTIONS
            // ─────────────────────────────────────
            function newQuote() {
                const result = getRandomUnseenQuote();
                displayQuote(result);
            }

            function copyQuote() {
                if (currentQuoteIndex < 0) { showToast('⚠️ Generate a quote first!'); return; }
                const quote = uniqueDatabase[currentQuoteIndex];
                let copyText = `"${quote.text}" — ${quote.author}`;
                if (quote.context && quoteContextEl.style.display !== 'none') copyText += `\n(${quote.context})`;
                navigator.clipboard.writeText(copyText).then(() => showToast('📋 Copied!')).catch(() => showToast(
                    '⚠️ Failed to copy.'));
            }

            function speakQuote() {
                if (currentQuoteIndex < 0) { showToast('⚠️ Generate a quote first!'); return; }
                const quote = uniqueDatabase[currentQuoteIndex];
                const utterance = new SpeechSynthesisUtterance(`"${quote.text}" — by ${quote.author}.`);
                utterance.rate = 0.9;
                utterance.pitch = 1.05;
                utterance.volume = 0.9;
                const voices = speechSynthesis.getVoices();
                const pref = voices.find(v => v.name.includes('Google') || v.name.includes('Samantha') || v.lang.startsWith(
                    'en'));
                if (pref) utterance.voice = pref;
                speechSynthesis.cancel();
                speechSynthesis.speak(utterance);
                showToast('🔊 Speaking...');
            }

            function setTopic(topic) {
                if (activeTopic === topic) return;
                activeTopic = topic;
                shownQuoteIndices.clear();
                totalQuotesShown = 0;
                currentQuoteIndex = -1;
                document.querySelectorAll('.topic-pill').forEach(p => p.classList.toggle('active', p.dataset.topic ===
                    topic));
                quoteTextEl.textContent = 'Click the button below to reveal a quote.';
                quoteAuthorEl.textContent = '';
                quoteContextEl.style.display = 'none';
                themeTagEl.textContent = '';
                updateCounts();
                setTimeout(() => newQuote(), 300);
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            btnNewQuote.addEventListener('click', newQuote);
            btnCopy.addEventListener('click', copyQuote);
            btnSpeak.addEventListener('click', speakQuote);
            topicsWrapper.addEventListener('click', (e) => {
                const pill = e.target.closest('.topic-pill');
                if (!pill) return;
                setTopic(pill.dataset.topic);
            });
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === ' ' || e.key === 'n' || e.key === 'N') { e.preventDefault();
                    newQuote(); } else if (e.key === 'c' || e.key === 'C') { e.preventDefault();
                    copyQuote(); }
            });
            speechSynthesis.onvoiceschanged = () => {};

            // ─────────────────────────────────────
            // INIT
            // ─────────────────────────────────────
            function init() {
                updateCounts();
                setTimeout(() => newQuote(), 500);
            }
            init();
            console.log('📜 Random Quote Generator ready with ' + uniqueDatabase.length + ' quotes!');
        })();
    </script>
</body>
</html>
